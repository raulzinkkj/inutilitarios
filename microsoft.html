<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70vh;
            font-size: 3.0rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: gray;
        }
        h1{
            margin-left: 5px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            width: 110px;
        }

        .card1 {
            width: 50px;
            height: 50px;
            background: red;
        }

        .card2 {
            width: 50px;
            height: 50px;
            background: green;
        }

        .card3 {
            width: 50px;
            height: 50px;
            background: blue;
        }

        .card4 {
            width: 50px;
            height: 50px;
            background: orange;
        }
    </style>
</head>

<body>
    
    <div class="container">

        <div class="card1">

        </div>
        <div class="card2">

        </div>
        <div class="card3">

        </div>
        <div class="card4">

        </div>
    </div>
    <h1>Microsoft</h1>
</body>

</html>
