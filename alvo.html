<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        div {
            border: 10px solid black;
            justify-content: center;
            align-items: center;
            display: flex;
        }

        .redondo1 {
            border-radius: 50%;
            width: 150px;
            height: 150px;
            border-left-color: red;
            border-right-color: red;
        }

        .redondo2 {
            border-radius: 50%;
            width: 130px;
            height: 130px;
            border-top-color: red;
            border-bottom-color: red;
        }

        .redondo3 {
            border-radius: 50%;
            width: 110px;
            height: 110px;
            border-left-color: red;
            border-right-color: red;
        }

        .redondo4 {
            border-radius: 50%;
            width: 90px;
            height: 90px;
            border-top-color: red;
            border-bottom-color: red;
        }

        .redondo5 {
            border-radius: 50%;
            width: 70px;
            height: 70px;
            border-left-color: red;
            border-right-color: red;
        }

        .redondo6 {
            border-radius: 50%;
            width: 50px;
            height: 50px;
            border-top-color: red;
            border-bottom-color: red;
        }

        .redondo7 {
            border-radius: 50%;
            width: 30px;
            height: 30px;
            border-left-color: red;
            border-right-color: red;
        }

        .redondo8 {
            border-radius: 50%;
            width: 10px;
            height: 10px;
            border-top-color: red;
            border-bottom-color: red;
        }
    </style>
</head>

<body>
    <div class="redondo1">
        <div class="redondo2">
            <div class="redondo3">
                <div class="redondo4">
                    <div class="redondo5">
                        <div class="redondo6">
                            <div class="redondo7">
                                <div class="redondo8"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
